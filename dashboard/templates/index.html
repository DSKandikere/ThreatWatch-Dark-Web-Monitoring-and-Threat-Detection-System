<!DOCTYPE html>
<html>
<head>
    <title>Dark Web Monitoring Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Auto refresh -->
    <meta http-equiv="refresh" content="10">
</head>

<body>

<div class="container-fluid">

    <!-- 🔷 Navbar -->
    <div class="dashboard-header d-flex justify-content-between align-items-center">
        <h2>🔐 Dark Web Monitoring</h2>

        <div>
            <span class="badge bg-info">Role: {{ role }}</span>
            <a href="/logout" class="btn btn-sm btn-outline-warning ms-2">Logout</a>
        </div>
    </div>

    <!-- 🔍 Search -->
    <form method="get" class="search-bar">
        <input type="text" name="q" value="{{ query }}" placeholder="Search leaks...">
    </form>

    <!-- 📊 Charts -->
    <div class="row mt-4">
        <div class="col-md-6">
            <div class="card chart-card">
                <canvas id="leakChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card chart-card">
                <canvas id="dataChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 📄 Results -->
    <div class="mt-4">
        {% for item in results %}
        <div class="data-card">

            <div class="d-flex justify-content-between">
                <h5>{{ item.url }}</h5>
                <small>{{ item.timestamp }}</small>
            </div>

            <div class="mt-2">
                <strong>Emails:</strong> {{ item.parsed_data.emails }}
            </div>

            <div>
                <strong>Passwords:</strong> {{ item.parsed_data.passwords }}
            </div>

            {% if item.parsed_data.passwords %}
            <span class="badge alert-badge">Sensitive</span>
            {% endif %}

            <p class="content-preview">
                {{ item.content[:200] }}...
            </p>

        </div>
        {% endfor %}
    </div>

</div>

<!-- 📊 Charts Script -->
<script>

    // ==============================
    // BAR CHART
    // ==============================
    new Chart(document.getElementById('leakChart'), {

        type: 'bar',

        data: {
            labels: {{ chart_labels | tojson }},

            datasets: [{
                label: 'Leaks per Day',
                data: {{ chart_values | tojson }},

                backgroundColor: '#36a2eb',
                borderColor: '#1d7fd1',
                borderWidth: 1
            }]
        },

        options: {
            responsive: true,

            plugins: {
                title: {
                    display: true,
                    text: 'Daily Leak Activity'
                }
            },

            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });


    // ==============================
    // PIE CHART
    // ==============================
    const ctx2 = document.getElementById('dataChart');

    new Chart(ctx2, {

        type: 'pie',

        data: {
            labels: {{ leak_labels | tojson }},

            datasets: [{
                label: 'Leak Distribution',

                data: {{ leak_values | tojson }},

                backgroundColor: [
                    '#ff6384',
                    '#36a2eb',
                    '#ffce56',
                    '#4bc0c0',
                    '#9966ff',
                    '#ff9f40',
                    '#8dd17e',
                    '#c45850',
                    '#5c6bc0'
                ],

                borderWidth: 1
            }]
        },

        options: {
            responsive: true,

            plugins: {

                legend: {
                    position: 'right'
                },

                title: {
                    display: true,
                    text: 'Leaked Data Distribution'
                }
            }
        }
    });

</script>

</body>
</html>
